<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – RoleMatch AI | LinkedIn Job Automation</title>
    <meta name="description"
        content="Sign in to RoleMatch AI – Automate your LinkedIn job search, applications, and outreach with AI-powered tools.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-input: rgba(30, 41, 59, 0.6);
            --border-subtle: rgba(99, 102, 241, 0.2);
            --border-focus: rgba(99, 102, 241, 0.6);
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #34d399;
            --error: #f87171;
            --linkedin-blue: #0a66c2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 2rem 0;
        }

        /* ── Animated background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }

        .bg-orb--1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.35), transparent 70%);
            top: -10%;
            right: -5%;
            animation-delay: 0s;
        }

        .bg-orb--2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.25), transparent 70%);
            bottom: -10%;
            left: -5%;
            animation-delay: -4s;
        }

        .bg-orb--3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -20px) scale(1.1);
            }

            100% {
                transform: translate(-20px, 30px) scale(0.95);
            }
        }

        /* ── Main container ── */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
            animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Glass card ── */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 2.5rem 2.2rem 2rem;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--accent-glow);
            transition: box-shadow 0.4s ease;
        }

        .login-card:hover {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 25px 70px rgba(0, 0, 0, 0.5),
                0 0 60px var(--accent-glow);
        }

        /* ── Logo & branding ── */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px var(--accent-glow);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                box-shadow: 0 8px 24px var(--accent-glow);
            }

            50% {
                box-shadow: 0 8px 40px rgba(99, 102, 241, 0.5);
            }
        }

        .brand h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.25;
        }

        .brand p {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            font-weight: 400;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.3rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.45rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.05rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 0.82rem 0.9rem 0.82rem 2.7rem;
            border-radius: 10px;
            border: 1.5px solid var(--border-subtle);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: var(--border-focus);
            background: rgba(30, 41, 59, 0.85);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .form-group input:focus~.input-icon,
        .form-group input:focus+.input-icon {
            color: var(--accent-secondary);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* ── Error message ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.25);
            color: var(--error);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            animation: shakeIn 0.4s ease;
        }

        .error-msg.visible {
            display: flex;
        }

        @keyframes shakeIn {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ── Buttons ── */
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px var(--accent-glow);
            letter-spacing: 0.3px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.12) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45);
        }

        .login-btn:hover::before {
            transform: translateX(100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .btn-text {
            position: relative;
            z-index: 1;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top: 2.5px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.4rem 0;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
        }

        /* ── Google sign-in button ── */
        .google-btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1.5px solid var(--border-subtle);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ── Remember & forgot ── */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.4rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.84rem;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.84rem;
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--text-primary);
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 1.6rem;
            padding-top: 1.3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-footer p {
            font-size: 0.84rem;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: var(--text-primary);
        }

        .copyright {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* ── Floating particles ── */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-secondary);
            border-radius: 50%;
            opacity: 0;
            animation: particleFade 6s ease-in-out infinite;
        }

        @keyframes particleFade {
            0% {
                opacity: 0;
                transform: translateY(0);
            }

            30% {
                opacity: 0.5;
            }

            100% {
                opacity: 0;
                transform: translateY(-120px);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .login-wrapper {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 16px;
            }

            .brand h1 {
                font-size: 1.4rem;
            }

            .brand-icon {
                width: 54px;
                height: 54px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Background effects -->
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Login card -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon">💼</div>
                <h1>RoleMatch AI</h1>
                <p>LinkedIn Job Role Automation</p>
            </div>

            <!-- Error message -->
            <div class="error-msg" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login form -->
            <form id="loginForm" autocomplete="on" novalidate>
                <div class="form-group" id="fullNameGroup" style="display: none;">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" name="fullName" placeholder="John Doe" autocomplete="name">
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="you@gmail.com" autocomplete="email"
                            required>
                        <span class="input-icon">✉️</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <span class="input-icon">🔒</span>
                        <button type="button" class="toggle-password" id="togglePassword"
                            aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me" id="rememberLabel">
                        <input type="checkbox" id="rememberMe" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>


            <!-- Footer -->
            <div class="card-footer">
                <p>Don't have an account? <a href="#" id="signUpLink">Create one</a></p>
            </div>
        </div>

        <p class="copyright">© 2026 RoleMatch AI · Built by Vaibhaw Upadhyay</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_init.js"></script>
    <script src="login.js"></script>
</body>

</html>
